<mat-toolbar color="primary">
  <span>Contract Clause Tracker</span>
  <span class="spacer"></span>
  <button mat-flat-button (click)="openUpload()">
    <mat-icon>upload_file</mat-icon> Upload Contract
  </button>
</mat-toolbar>

<div class="filters">
  <mat-form-field appearance="outline">
    <mat-label>Search by filename</mat-label>
    <input matInput [(ngModel)]="search" (ngModelChange)="load()" />
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Filter by clause type</mat-label>
    <mat-select [(ngModel)]="selectedClauseId" (ngModelChange)="load()">
      <mat-option value="">All</mat-option>
      @for (clause of clauses(); track clause.id) {
        <mat-option [value]="clause.id">{{ clause.name }}</mat-option>
      }
    </mat-select>
  </mat-form-field>
</div>

<div class="table-container">
  <table mat-table [dataSource]="contracts()">
    <ng-container matColumnDef="filename">
      <th mat-header-cell *matHeaderCellDef>Filename</th>
      <td mat-cell *matCellDef="let c">{{ c.filename }}</td>
    </ng-container>

    <ng-container matColumnDef="uploaded_at">
      <th mat-header-cell *matHeaderCellDef>Uploaded</th>
      <td mat-cell *matCellDef="let c">{{ c.uploaded_at | date:'medium' }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let c; columns: columns" (click)="openContract(c.id)"></tr>
  </table>

  @if (contracts().length === 0) {
    <p class="empty">No contracts found.</p>
  }
</div>
